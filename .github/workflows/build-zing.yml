name: build Azul Zing
on:
  push:
    branches:
      - master
    paths:
      - java/zing/**
      - .github/workflows/build-zing.yml
jobs:
  push:
    name: Push
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip]')"

    strategy:
      fail-fast: false

      matrix:
        image:

          #  Azul Prime (Zing)
          - {name: "8-prime", image: "8", platforms: "linux/amd64,linux/arm64"}
          - {name: "11-prime", image: "11", platforms: "linux/amd64,linux/arm64"}
          - {name: "17-prime", image: "17", platforms: "linux/amd64,linux/arm64"}
          - {name: "21-prime", image: "21", platforms: "linux/amd64,linux/arm64"}
          - {name: "23-prime", image: "23", platforms: "linux/amd64,linux/arm64"}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ matrix.image.platforms != 'linux/amd64' }}

      - name: Install buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./java/zing
          file: ./java/zing/${{ matrix.image.image }}/Dockerfile
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ghcr.io/rafi67000/images:zing${{ matrix.image.image }}
