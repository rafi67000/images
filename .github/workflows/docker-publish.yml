name: Docker build and push

on:
  push:
    branches:
      - master

jobs:
  push:
    name: Push
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip]')"

    strategy:
      fail-fast: false

      matrix:
        image:
          # Jenkins
          # - {type: "other", image: "jenkins", PREFIX: "jenkins", SUFFIX: "", context: "./other", platforms: "linux/amd64,linux/arm64"}

          # Azul Zulu OpenJDK
          - {type: "java", image: "8-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "11-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "17-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "20-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}

          # Deprecated Azul Zulu OpenJDK
          # - {type: "java", image: "16-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          # - {type: "java", image: "18-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          # - {type: "java", image: "19-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}

          #  Azul Prime (Zing)
          - {type: "java", image: "8-prime"   , PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "11-prime"   , PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "17-prime"   , PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          - {type: "java", image: "19-prime"   , PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64"}

          # Erlang
          # - {type: "erlang", image: "22", PREFIX: "erlang", SUFFIX: "", context: "./erlang", platforms: "linux/amd64,linux/arm64"}
          # - {type: "erlang", image: "23", PREFIX: "erlang", SUFFIX: "", context: "./erlang", platforms: "linux/amd64,linux/arm64"}
          # - {type: "erlang", image: "24", PREFIX: "erlang", SUFFIX: "", context: "./erlang", platforms: "linux/amd64,linux/arm64"}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        if: ${{ matrix.image.platforms != 'linux/amd64' }}

      - name: Install buildx
        uses: docker/setup-buildx-action@v2
        with:
          buildkitd-flags: --debug

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.image.context }}
          file: ./${{ matrix.image.type }}/${{ matrix.image.image }}/Dockerfile
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ghcr.io/rafi67000/pterodactyl-images:${{ matrix.image.PREFIX }}${{ matrix.image.image }}${{ matrix.image.SUFFIX }}
