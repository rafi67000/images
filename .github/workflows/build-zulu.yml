name: build Azul Zulu
on:
  push:
    branches:
      - master
    paths:
      - java/zulu/**
jobs:
  push:
    name: Push
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip]')"

    strategy:
      fail-fast: false

      matrix:
        image:

          # Azul Zulu OpenJDK
          - {image: "8-zulu", PREFIX: "java", SUFFIX: "", platforms: "linux/amd64,linux/arm64"}
          - {image: "11-zulu", PREFIX: "java", SUFFIX: "", platforms: "linux/amd64,linux/arm64"}
          - {image: "17-zulu", PREFIX: "java", SUFFIX: "", platforms: "linux/amd64,linux/arm64"}
          - {image: "20-zulu", PREFIX: "java", SUFFIX: "", platforms: "linux/amd64,linux/arm64"}

          # Deprecated Azul Zulu OpenJDK
          # - {type: "java", image: "16-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          # - {type: "java", image: "18-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}
          # - {type: "java", image: "19-zulu", PREFIX: "java", SUFFIX: "", context: "./java", platforms: "linux/amd64,linux/arm64"}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        if: ${{ matrix.image.platforms != 'linux/amd64' }}

      - name: Install buildx
        uses: docker/setup-buildx-action@v2
        with:
          buildkitd-flags: --debug

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./java/zulu
          file: ./java/zulu/${{ matrix.image.image }}/Dockerfile
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ghcr.io/rafi67000/pterodactyl-images:${{ matrix.image.PREFIX }}${{ matrix.image.image }}${{ matrix.image.SUFFIX }}
